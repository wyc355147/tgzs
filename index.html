<!-- 数据收集脚本 (适配元数据架构) -->
<script>
// 初始化全局元数据收集池
window.allJournalMetaIssues = window.allJournalMetaIssues || [];

// 收集所有已加载的单期元数据
if (window.journalIssueMeta) {
    const exists = window.allJournalMetaIssues.some(issue =>
        issue.metadata && issue.metadata.issueNumber === window.journalIssueMeta.metadata.issueNumber
    );
    if (!exists) {
        window.allJournalMetaIssues.push(window.journalIssueMeta);
        console.log('元数据已注册至 allJournalMetaIssues 池，当前期数：', window.journalIssueMeta.metadata?.issueNumber);
    }
}

// 兼容旧代码：同时保留 allJournalIssues 引用（降级）
window.allJournalIssues = window.allJournalMetaIssues;

console.log('已收集元数据期刊数量:', window.allJournalMetaIssues.length);
</script>
